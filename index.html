<!DOCTYPE html>
<html>
<head>
<title>Secure Login</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #222;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

input {
    padding: 10px;
    margin: 10px;
    width: 220px;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="box">
    <h1>Login</h1>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user === "suyash" && pass === "1234") {
        localStorage.setItem("login", "yes");
        window.location.href = "dashboard.html";
    } else {
        alert("Wrong Password ❌");
    }
}
</script>

</body>
</html>
